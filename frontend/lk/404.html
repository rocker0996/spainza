<style>
  .lk-not-found {
    --nf-blue: #191b25;
    --nf-pink: #fdabaf;
    --nf-surface: #fbf8ff;
    --nf-btn: #0052ff;
    --nf-btn-hover: #003ec7;
    background: var(--nf-surface);
    font-family: 'Inter', sans-serif;
    color: var(--nf-blue);
  }
  .lk-not-found__center {
    min-height: calc(100vh - 6rem);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem 1.5rem;
    box-sizing: border-box;
  }
  @media (min-width: 768px) {
    .lk-not-found__center { min-height: 100vh; }
  }
  .lk-not-found__error {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: flex-end;
    gap: 0.25rem;
  }
  .lk-not-found__number {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: clamp(6rem, 18vw, 15rem);
    line-height: 1;
    color: var(--nf-blue);
  }
  .lk-not-found__illustration {
    position: relative;
    width: 12.2rem;
    height: 13rem;
    margin: 0 2.1rem;
    flex-shrink: 0;
  }
  .lk-not-found__circle {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 12.2rem;
    height: 11.4rem;
    border-radius: 50%;
    background-color: var(--nf-blue);
  }
  .lk-not-found__clip {
    position: absolute;
    bottom: 0.3rem;
    left: 50%;
    transform: translateX(-50%);
    overflow: hidden;
    width: 12.5rem;
    height: 13rem;
    border-radius: 0 0 50% 50%;
  }
  .lk-not-found__paper {
    position: absolute;
    bottom: -0.3rem;
    left: 50%;
    transform: translateX(-50%);
    width: 9.2rem;
    height: 12.4rem;
    border: 0.3rem solid var(--nf-blue);
    background-color: #fff;
    border-radius: 0.8rem;
    box-sizing: border-box;
  }
  .lk-not-found__paper::before {
    content: "";
    position: absolute;
    top: -0.7rem;
    right: -0.7rem;
    width: 1.4rem;
    height: 1rem;
    background-color: #fff;
    border-bottom: 0.3rem solid var(--nf-blue);
    transform: rotate(45deg);
  }
  .lk-not-found__face {
    position: relative;
    width: 9.2rem;
    height: 5rem;
    margin-top: 2.3rem;
  }
  .lk-not-found__eyes {
    position: absolute;
    top: 0;
    left: 2.4rem;
    width: 4.6rem;
    height: 0.8rem;
  }
  .lk-not-found__eye {
    position: absolute;
    bottom: 0;
    width: 0.8rem;
    height: 0.8rem;
    border-radius: 50%;
    background-color: var(--nf-blue);
    animation: lk-not-found-blink 4s ease-in-out infinite;
  }
  .lk-not-found__eye-left { left: 0; }
  .lk-not-found__eye-right { right: 0; }
  @keyframes lk-not-found-blink {
    0%, 50%, 54%, 100% { height: 0.8rem; }
    52% { height: 0.1rem; }
  }
  .lk-not-found__cheek {
    position: absolute;
    top: 1.6rem;
    width: 1rem;
    height: 0.2rem;
    border-radius: 50%;
    background-color: var(--nf-pink);
  }
  .lk-not-found__cheek-left { left: 1.4rem; }
  .lk-not-found__cheek-right { right: 1.4rem; }
  .lk-not-found__mouth {
    position: absolute;
    top: 3.1rem;
    left: 50%;
    width: 1.6rem;
    height: 0.2rem;
    border-radius: 0.1rem;
    transform: translateX(-50%);
    background-color: var(--nf-blue);
  }
  @media (max-width: 480px) {
    .lk-not-found__number { font-size: 6rem; }
    .lk-not-found__illustration {
      width: 8.5rem;
      height: 9rem;
      margin: 0 0.75rem;
    }
    .lk-not-found__circle { width: 8.5rem; height: 8rem; }
    .lk-not-found__clip { width: 8.7rem; height: 9rem; }
    .lk-not-found__paper { width: 6.4rem; height: 8.5rem; }
    .lk-not-found__face { width: 6.4rem; margin-top: 1.6rem; }
    .lk-not-found__eyes { left: 1.6rem; width: 3.2rem; }
    .lk-not-found__cheek-left { left: 0.8rem; }
    .lk-not-found__cheek-right { right: 0.8rem; }
  }
  .lk-not-found__text {
    margin-top: clamp(2rem, 6vw, 5rem);
    max-width: 28rem;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    color: var(--nf-blue);
  }
  .lk-not-found__button {
    margin-top: clamp(1.5rem, 4vw, 4rem);
    padding: 1rem 2.5rem;
    font-family: 'Manrope', sans-serif;
    font-size: 0.9375rem;
    font-weight: 700;
    color: #fff;
    background-color: var(--nf-btn);
    border-radius: 0.75rem;
    text-decoration: none;
    transition: background-color 0.2s ease, transform 0.15s ease;
    box-shadow: 0 10px 24px rgba(0, 82, 255, 0.22);
  }
  .lk-not-found__button:hover {
    background-color: var(--nf-btn-hover);
    transform: translateY(-1px);
  }
  .lk-not-found__button:active {
    transform: translateY(0);
  }
</style>
</head>
