server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /api/ {
        return 404;
    }

    location = / {
        return 301 https://$host/ru/;
    }

    location = /index.html {
        return 301 https://$host/ru/;
    }

    location = /contact.html {
        return 301 https://$host/ru/contact.html;
    }

    location = /gold.html {
        return 301 https://$host/ru/gold.html;
    }

    location = /nomad.html {
        return 301 https://$host/ru/nomad.html;
    }

    location = /privacy-policy.html {
        return 301 https://$host/ru/privacy-policy.html;
    }

    location = /process.html {
        return 301 https://$host/ru/process.html;
    }

    location = /servces.html {
        return 301 https://$host/ru/services.html;
    }

    location = /services.html {
        return 301 https://$host/ru/services.html;
    }

    location ~ ^/frontend/(en|ru)/index\.html$ {
        return 301 https://$host/$1/;
    }

    location ~ ^/frontend/(en|ru)/(.*)$ {
        return 301 https://$host/$1/$2;
    }

    location = /en {
        return 301 https://$host/en/;
    }

    location = /ru {
        return 301 https://$host/ru/;
    }

    location = /en/ {
        try_files /frontend/en/index.html =404;
    }

    location = /ru/ {
        try_files /frontend/ru/index.html =404;
    }

    location ^~ /en/ {
        try_files /frontend$uri =404;
    }

    location ^~ /ru/ {
        try_files /frontend$uri =404;
    }

    location ^~ /img/ {
        alias /usr/share/nginx/html/frontend/img/;
    }

    location ^~ /css/ {
        alias /usr/share/nginx/html/frontend/css/;
    }

    location ^~ /js/ {
        alias /usr/share/nginx/html/frontend/js/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
