services:
  spainza-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - spainza-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - spainza-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  spainza-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      FLASK_ENV: production
      SECRET_KEY: ${JWT_SECRET}
    volumes:
      - spainza-app-data:/app/database
      - spainza-storage:/app/storage
    expose:
      - "5000"
    networks:
      - edge
      - public
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  spainza-site:
    build:
      context: .
      dockerfile: docker/site/Dockerfile
    restart: unless-stopped
    depends_on:
      spainza-backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  spainza-telegram-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      FLASK_ENV: production
      SECRET_KEY: ${JWT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://spainza.com}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-spainza_bot}
    command: ["python", "/app/run_telegram_worker.py"]
    volumes:
      - spainza-app-data:/app/database
      - spainza-storage:/app/storage
    depends_on:
      spainza-backend:
        condition: service_healthy

networks:
  spainza-internal:
    internal: true
  edge:
    external: true
    name: ${EDGE_NETWORK:-boletus_default}
  public:
    driver: bridge

volumes:
  spainza-postgres-data:
  spainza-app-data:
  spainza-storage:
